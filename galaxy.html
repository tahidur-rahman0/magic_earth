<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infinite Galaxy Zoom</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: Arial, sans-serif; }
        #canvas-container { width: 100vw; height: 100vh; position: absolute; top: 0; left: 0; z-index: 1; }
        #video-container { position: absolute; bottom: 20px; right: 20px; width: 320px; height: 240px; z-index: 10; border-radius: 10px; overflow: hidden; box-shadow: 0 0 20px rgba(0, 255, 255, 0.5); border: 2px solid rgba(255, 255, 255, 0.2); }
        #webcam { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        #output_canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; transform: scaleX(-1); }
        #ui-overlay { position: absolute; top: 20px; left: 20px; color: white; z-index: 10; background: rgba(0, 0, 0, 0.7); padding: 20px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.2); box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        h1 { margin-top: 0; font-size: 24px; color: #ff00ff; }
        p { margin: 5px 0; font-size: 14px; color: #ccc; }
        .instruction { font-weight: bold; color: #fff; margin-top: 15px; }
        #status { color: #ffcc00; font-weight: bold; }
        #zoom-status { font-weight: bold; font-family: monospace; color: #00ffff; font-size: 18px; margin-top: 10px; }
        #enable-cam-btn { background-color: #ff00ff; color: #000; border: none; padding: 10px 20px; border-radius: 5px; font-weight: bold; cursor: pointer; margin-top: 15px; transition: all 0.3s; }
        #enable-cam-btn:hover { background-color: #fff; }
    </style>
</head>
<body>
    <div id="ui-overlay">
        <h1>Infinite Galaxy Zoom</h1>
        <p>Status: <span id="status">Loading AI...</span></p>
        <div class="instruction">Controls:</div>
        <p>🖐️ <b>Open Hand:</b> Rotate the Universe</p>
        <p>🤏 <b>Pinch:</b> Zoom into Solar System</p>
        <p>✋ <b>Spread:</b> Zoom out to Milky Way</p>
        <div id="zoom-status">Scale: MILKY WAY</div>
        <button id="enable-cam-btn" style="display:none;">Enable Camera</button>
        <p style="margin-top:20px; font-size:12px;">Scale highly exaggerated for visual effect.</p>
    </div>

    <div id="canvas-container"></div>
    <div id="video-container">
        <video id="webcam" autoplay playsinline></video>
        <canvas id="output_canvas"></canvas>
    </div>

    <!-- Three.js Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <!-- MediaPipe Libraries -->
    <script type="module">
        import { HandLandmarker, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.0/+esm";

        // --- 1. SET UP SCENE ---
        // We use logarithmic depth buffer because the scale difference between galaxy and planets is huge
        const container = document.getElementById('canvas-container');
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true, logarithmicDepthBuffer: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        container.appendChild(renderer.domElement);

        const scene = new THREE.Scene();
        // Camera starts way out to see the galaxy
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 15000000);
        camera.position.z = 20000;
        camera.position.y = 15000;
        camera.lookAt(0,0,0);

        const universeGroup = new THREE.Group();
        scene.add(universeGroup);

        // --- 2. THE MILKY WAY GALAXY (MACRO SCALE) ---
        function createGalaxy() {
            const particleCount = 200000;
            const geometry = new THREE.BufferGeometry();
            const positions = new Float32Array(particleCount * 3);
            const colors = new Float32Array(particleCount * 3);

            const colorInside = new THREE.Color(0xff8800); // Yellow/Orange core
            const colorOutside = new THREE.Color(0x0088ff); // Blue arms

            const parameters = {
                radius: 40000, branches: 4, spin: 1, randomness: 1.5, randomnessPower: 2.5
            };

            for(let i = 0; i < particleCount; i++) {
                const i3 = i * 3;
                // Distribute particles along branches
                const radius = Math.random() * parameters.radius;
                const spinAngle = radius * parameters.spin;
                const branchAngle = (i % parameters.branches) / parameters.branches * Math.PI * 2;

                // Random scatter
                const randomX = Math.pow(Math.random(), parameters.randomnessPower) * (Math.random() < 0.5 ? 1 : -1) * parameters.randomness * radius;
                const randomY = Math.pow(Math.random(), parameters.randomnessPower) * (Math.random() < 0.5 ? 1 : -1) * parameters.randomness * radius;
                const randomZ = Math.pow(Math.random(), parameters.randomnessPower) * (Math.random() < 0.5 ? 1 : -1) * parameters.randomness * radius;
                
                // Keep the center denser and flatter
                const yRandomizer = (radius < 5000) ? randomY * 2 : randomY * 0.2;

                positions[i3] = Math.cos(branchAngle + spinAngle) * radius + randomX;
                positions[i3 + 1] = yRandomizer;
                positions[i3 + 2] = Math.sin(branchAngle + spinAngle) * radius + randomZ;

                // Color interpolation based on distance from center
                const mixedColor = colorInside.clone().lerp(colorOutside, radius / parameters.radius);
                
                // Add extreme blinding light to the center black hole area
                if (radius < 1000) {
                    colors[i3] = 1.0; colors[i3+1] = 1.0; colors[i3+2] = 1.0;
                } else {
                    colors[i3] = mixedColor.r; colors[i3+1] = mixedColor.g; colors[i3+2] = mixedColor.b;
                }
            }

            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

            // Custom small material so the particles don't block everything
            const material = new THREE.PointsMaterial({
                size: 200, // Size is large because space is huge
                sizeAttenuation: true,
                depthWrite: false,
                blending: THREE.AdditiveBlending,
                vertexColors: true,
                transparent: true,
                opacity: 0.8
            });

            const points = new THREE.Points(geometry, material);
            universeGroup.add(points);
            return points;
        }
        const galaxy = createGalaxy();

        // Background void stars (further back)
        const bgGeo = new THREE.BufferGeometry();
        const bgPos = [];
        for(let i=0; i<3000; i++) {
            const x = (Math.random() - 0.5) * 500000;
            const y = (Math.random() - 0.5) * 500000;
            const z = (Math.random() - 0.5) * 500000;
            // Only outer layer
            if (Math.abs(x) > 50000 || Math.abs(z) > 50000) bgPos.push(x,y,z);
        }
        bgGeo.setAttribute('position', new THREE.Float32BufferAttribute(bgPos, 3));
        const bgMat = new THREE.PointsMaterial({color: 0x444444, size: 800});
        universeGroup.add(new THREE.Points(bgGeo, bgMat));

        // --- 3. THE SOLAR SYSTEM (MICRO SCALE) ---
        // Place the solar system in one of the spiral arms
        const solarSystemGroup = new THREE.Group();
        // Move the solar system group far from the galactic core
        solarSystemGroup.position.set(15000, 0, 10000); 
        universeGroup.add(solarSystemGroup);

        // Lighting specifically for the sun
        const sunLight = new THREE.PointLight(0xffffff, 3, 20000);
        solarSystemGroup.add(sunLight);
        scene.add(new THREE.AmbientLight(0x222222));

        const sunGeo = new THREE.SphereGeometry(300, 64, 64);
        const sunMat = new THREE.MeshBasicMaterial({ color: 0xffdd00 });
        const sun = new THREE.Mesh(sunGeo, sunMat);
        solarSystemGroup.add(sun);
        
        const sunAtmo = new THREE.Mesh(
            new THREE.SphereGeometry(320, 64, 64), 
            new THREE.MeshBasicMaterial({ color: 0xffaa00, transparent: true, opacity: 0.4, blending: THREE.AdditiveBlending, side: THREE.BackSide})
        );
        solarSystemGroup.add(sunAtmo);

        const planetsData = [];
        function createPlanet(size, distance, color, speed, hasRings = false) {
            const orbitGroup = new THREE.Group();
            
            const geometry = new THREE.SphereGeometry(size, 32, 32);
            const material = new THREE.MeshStandardMaterial({ color: color, roughness: 0.6, metalness: 0.1 });
            const planet = new THREE.Mesh(geometry, material);
            planet.position.x = distance;
            
            if (hasRings) {
                const ringGeo = new THREE.RingGeometry(size * 1.5, size * 2.2, 32);
                const ringMat = new THREE.MeshStandardMaterial({ color: 0xcccccc, transparent: true, opacity: 0.7, side: THREE.DoubleSide });
                const ring = new THREE.Mesh(ringGeo, ringMat);
                ring.rotation.x = Math.PI / 2 + 0.3;
                planet.add(ring);
            }

            orbitGroup.add(planet);
            solarSystemGroup.add(orbitGroup);
            
            // Scaled up trails
            const trailGeometry = new THREE.RingGeometry(distance - 10, distance + 10, 128);
            const trailMaterial = new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.15, side: THREE.DoubleSide });
            const trail = new THREE.Mesh(trailGeometry, trailMaterial);
            trail.rotation.x = Math.PI / 2;
            solarSystemGroup.add(trail);

            planetsData.push({ orbitGroup: orbitGroup, planetMesh: planet, speed: speed });
        }

        // Extremely exaggerated sizes compared to reality so we can see them, but still tiny vs the galaxy!
        // Mercury, Venus, Earth, Mars, Jupiter, Saturn, Uranus, Neptune
        createPlanet(20, 800, 0x888888, 0.04);         
        createPlanet(40, 1200, 0xffaa33, 0.015);        
        createPlanet(45, 1700, 0x0088ff, 0.01);         
        createPlanet(30, 2200, 0xff4400, 0.008);        
        createPlanet(180, 3500, 0xff9900, 0.002);        
        createPlanet(140, 5000, 0xddccaa, 0.0009, true); 
        createPlanet(100, 6500, 0x00ffff, 0.0004);      
        createPlanet(90, 8000, 0x0000ff, 0.0001);      

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- 4. SET UP MEDIAPIPE & LOGARITHMIC ZOOM LOGIC ---
        let handLandmarker = undefined;
        let runningMode = "VIDEO";
        const video = document.getElementById("webcam");
        const canvasElement = document.getElementById("output_canvas");
        const canvasCtx = canvasElement.getContext("2d");
        const enableWebcamButton = document.getElementById("enable-cam-btn");
        const statusText = document.getElementById("status");
        const zoomStatusText = document.getElementById("zoom-status");
        
        let targetRotationX = 0;
        let targetRotationY = 0;
        let currentRotationX = 0;
        let currentRotationY = 0;
        
        // Logarithmic Zoom Mapping state
        // 0.0 = Solar System view (Very Zoomed In)
        // 1.0 = Milky Way view (Very Zoomed Out)
        let normalizedZoomTarget = 1.0; 
        let currentNormalizedZoom = 1.0;
        
        const rotationDamping = 0.05;
        const zoomDamping = 0.08;

        async function createHandLandmarker() {
            const vision = await FilesetResolver.forVisionTasks(
                "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.0/wasm"
            );
            handLandmarker = await HandLandmarker.createFromOptions(vision, {
                baseOptions: {
                    modelAssetPath: `https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task`,
                    delegate: "GPU"
                },
                runningMode: runningMode,
                numHands: 1
            });
            statusText.innerText = "Ready!";
            statusText.style.color = "#00ff00";
            enableWebcamButton.style.display = "block";
        }
        createHandLandmarker();

        let webcamRunning = false;
        enableWebcamButton.addEventListener("click", () => {
            if (!handLandmarker) return;
            if (webcamRunning) {
                webcamRunning = false;
                enableWebcamButton.innerText = "Enable Camera";
            } else {
                webcamRunning = true;
                enableWebcamButton.style.display = "none";
                statusText.innerText = "Tracking Hands...";
                const constraints = { video: true };
                navigator.mediaDevices.getUserMedia(constraints).then((stream) => {
                    video.srcObject = stream;
                    video.addEventListener("loadeddata", predictWebcam);
                });
            }
        });

        let lastVideoTime = -1;

        async function predictWebcam() {
            canvasElement.style.width = video.videoWidth;
            canvasElement.style.height = video.videoHeight;
            canvasElement.width = video.videoWidth;
            canvasElement.height = video.videoHeight;

            if (runningMode === "IMAGE") {
                runningMode = "VIDEO";
                await handLandmarker.setOptions({ runningMode: "VIDEO" });
            }

            let startTimeMs = performance.now();
            let results;
            if (lastVideoTime !== video.currentTime) {
                lastVideoTime = video.currentTime;
                results = handLandmarker.detectForVideo(video, startTimeMs);
            }

            canvasCtx.save();
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
            
            if (results && results.landmarks && results.landmarks.length > 0) {
                const landmarks = results.landmarks[0]; 
                const palmX = landmarks[9].x;
                const palmY = landmarks[9].y;
                const thumb = landmarks[4];
                const index = landmarks[8];
                const pinchDist = Math.sqrt(Math.pow(thumb.x - index.x, 2) + Math.pow(thumb.y - index.y, 2));
                
                // Draw UI
                canvasCtx.strokeStyle = "#ff00ff";
                canvasCtx.lineWidth = 2;
                canvasCtx.fillStyle = "rgba(255, 0, 255, 0.2)";
                
                canvasCtx.beginPath();
                canvasCtx.moveTo(thumb.x * canvasElement.width, thumb.y * canvasElement.height);
                canvasCtx.lineTo(index.x * canvasElement.width, index.y * canvasElement.height);
                canvasCtx.lineTo(palmX * canvasElement.width, palmY * canvasElement.height);
                canvasCtx.closePath();
                canvasCtx.stroke();
                canvasCtx.fill();
                
                canvasCtx.beginPath();
                canvasCtx.arc(index.x * canvasElement.width, index.y * canvasElement.height, 5, 0, 2 * Math.PI);
                canvasCtx.fillStyle = "#fff";
                canvasCtx.fill();

                canvasCtx.beginPath();
                canvasCtx.arc(thumb.x * canvasElement.width, thumb.y * canvasElement.height, 5, 0, 2 * Math.PI);
                canvasCtx.fill();

                // ZOOM LOGIC - map pinch directly to logarithmic scale
                if (pinchDist < 0.1) {
                     canvasCtx.strokeStyle = "#00ffff"; // Turn cyan when zooming in
                     canvasCtx.beginPath();
                     canvasCtx.moveTo(thumb.x * canvasElement.width, thumb.y * canvasElement.height);
                     canvasCtx.lineTo(index.x * canvasElement.width, index.y * canvasElement.height);
                     canvasCtx.stroke();
                }
                
                // 1.0 (spread) scales to exactly 1.0 zoom level
                // 0.05 (pinched) scales to exactly 0.0 zoom level
                let rawZoom = (pinchDist - 0.05) / 0.45;
                normalizedZoomTarget = Math.max(0.0, Math.min(1.0, rawZoom));
                
                // ROTATION LOGIC
                targetRotationY = -(palmX - 0.5) * Math.PI * 2; 
                targetRotationX = (palmY - 0.5) * Math.PI;

            } else {
                targetRotationY += 0.001; // Ssshhh, gentle idle rotation
            }
            canvasCtx.restore();

            if (webcamRunning === true) {
                window.requestAnimationFrame(predictWebcam);
            }
        }

        // Intercept logic for camera movement
        function exponentialLerp(start, end, amt) {
            // Smoothly move between vast numbers by lerping their logs
            return Math.exp(start + (end - start) * amt);
        }

        function updateCameraAndScale() {
            // Apply dampening to the normalized zoom target
            currentNormalizedZoom += (normalizedZoomTarget - currentNormalizedZoom) * zoomDamping;

            // Camera target boundaries
            // Z=80000 : Way out looking at the galaxy
            // Z=5000  : Close looking right at the solar system edge
            // We use interpolation formula based on normalized zoom [0 = 5000, 1 = 80000]
            // We'll calculate a logarithmic distance offset.
            const logMinDist = Math.log(4000); // Solar system distance
            const logMaxDist = Math.log(80000); // Galaxy view distance
            
            const currentLogDist = logMinDist + (logMaxDist - logMinDist) * currentNormalizedZoom;
            const distance = Math.exp(currentLogDist);

            // Interpolate the camera LookAt target between the galactic core (0,0,0) 
            // and the Solar System position (15000, 0, 10000) based on zoom
            // As we zoom in, the camera pans to the solar system!
            const panFactor = 1.0 - Math.pow(currentNormalizedZoom, 0.4); // Bias pan towards the end
            const lookAtX = solarSystemGroup.position.x * panFactor;
            const lookAtY = solarSystemGroup.position.y * panFactor;
            const lookAtZ = solarSystemGroup.position.z * panFactor;

            // Update UI text based on zoom tier
            if (currentNormalizedZoom > 0.7) {
                zoomStatusText.innerText = "Scale: MILKY WAY";
            } else if (currentNormalizedZoom > 0.3) {
                zoomStatusText.innerText = "Scale: ORION ARM";
            } else {
                zoomStatusText.innerText = "Scale: SOLAR SYSTEM";
            }

            // Move the camera around the target based on hand rotation
            // and distance based on zoom level
            const orbitY = Math.max(10, distance * 0.5); // Provide an angle looking downward slightly
            
            // X and Z revolve around the LookAt spot
            camera.position.x = lookAtX;
            camera.position.y = lookAtY + orbitY;
            camera.position.z = lookAtZ + distance;

            // Point exactly at the interpolated subject
            camera.lookAt(lookAtX, lookAtY, lookAtZ);
        }

        // --- 5. MAIN RENDER LOOP ---
        function animate() {
            requestAnimationFrame(animate);

            planetsData.forEach(p => {
                p.orbitGroup.rotation.y += p.speed;
                p.planetMesh.rotation.y += 0.02; 
            });
            sun.rotation.y += 0.005;

            // Slowly rotate the entire galaxy 
            galaxy.rotation.y += 0.0005;

            // Apply manual rotation to the entire universe container based on hand tilt
            currentRotationX += (targetRotationX - currentRotationX) * rotationDamping;
            currentRotationY += (targetRotationY - currentRotationY) * rotationDamping;
            const clampedX = Math.max(-Math.PI/2 + 0.1, Math.min(Math.PI/2 - 0.1, currentRotationX));
            universeGroup.rotation.x = clampedX;
            universeGroup.rotation.y = currentRotationY;

            // Calculate complex zoom/pan mechanics
            updateCameraAndScale();

            renderer.render(scene, camera);
        }
        
        animate();
    </script>
</body>
</html>
