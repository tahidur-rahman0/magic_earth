<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Hand Gesture Globe</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            font-family: Arial, sans-serif;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }
        #video-container {
            position: absolute;
            bottom: 20px;
            right: 20px;
            width: 320px;
            height: 240px;
            z-index: 10;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.5);
            border: 2px solid rgba(255, 255, 255, 0.2);
        }
        #webcam {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1); /* Mirror */
        }
        #output_canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            transform: scaleX(-1); /* Mirror */
        }
        #ui-overlay {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            z-index: 10;
            background: rgba(0, 0, 0, 0.7);
            padding: 20px;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.2);
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        h1 { margin-top: 0; font-size: 24px; color: #00ffff; }
        p { margin: 5px 0; font-size: 14px; color: #ccc; }
        .instruction { font-weight: bold; color: #fff; margin-top: 15px; }
        #status { color: #ffcc00; font-weight: bold; }
        #enable-cam-btn {
            background-color: #00ffff;
            color: #000;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
            transition: all 0.3s;
        }
        #enable-cam-btn:hover { background-color: #fff; }
    </style>
</head>
<body>

    <!-- UI Overlay -->
    <div id="ui-overlay">
        <h1>Hand Gesture Globe</h1>
        <p>Status: <span id="status">Loading AI...</span></p>
        <div class="instruction">Controls:</div>
        <p>🖐️ <b>Open Hand:</b> Move left/right/up/down to rotate Earth.</p>
        <p>🤏 <b>Pinch:</b> Bring index & thumb together to zoom in.</p>
        <p>✋ <b>Spread:</b> Move index & thumb apart to zoom out.</p>
        <button id="enable-cam-btn" style="display:none;">Enable Camera</button>
    </div>

    <!-- 3D Globe Canvas -->
    <div id="canvas-container"></div>

    <!-- Webcam & AI Overlays -->
    <div id="video-container">
        <video id="webcam" autoplay playsinline></video>
        <canvas id="output_canvas"></canvas>
    </div>

    <!-- Three.js Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <!-- MediaPipe Libraries -->
    <script type="module">
        import { HandLandmarker, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.8/+esm";

        // --- 1. SET UP 3D GLOBE (THREE.JS) ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        
        // Add starfield background
        const bgGeometry = new THREE.SphereGeometry(100, 64, 64);
        const bgMaterial = new THREE.MeshBasicMaterial({
            color: 0xffffff,
            side: THREE.BackSide,
            // Simple procedural stars if we don't have an image
        });
        const backgroundObj = new THREE.Mesh(bgGeometry, bgMaterial);
        scene.add(backgroundObj);
        
        // Add tiny stars manually for better effect without external texture
        const starsGeometry = new THREE.BufferGeometry();
        const starsMaterial = new THREE.PointsMaterial({color: 0xFFFFFF, size: 0.1, transparent: true, opacity: 0.8});
        const starsVertices = [];
        for(let i=0; i<3000; i++) {
            const x = (Math.random() - 0.5) * 200;
            const y = (Math.random() - 0.5) * 200;
            const z = (Math.random() - 0.5) * 200;
            if(Math.sqrt(x*x + y*y + z*z) > 10) { // Keep away from center
                starsVertices.push(x, y, z);
            }
        }
        starsGeometry.setAttribute('position', new THREE.Float32BufferAttribute(starsVertices, 3));
        const stars = new THREE.Points(starsGeometry, starsMaterial);
        scene.add(stars);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 15;

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        container.appendChild(renderer.domElement);

        // Create Earth Sphere
        const geometry = new THREE.SphereGeometry(5, 64, 64);
        
        // We will use high quality public textures
        const textureLoader = new THREE.TextureLoader();
        const earthTexture = textureLoader.load('https://unpkg.com/three-globe/example/img/earth-blue-marble.jpg');
        const bumpMap = textureLoader.load('https://unpkg.com/three-globe/example/img/earth-topology.png');
        const specularMap = textureLoader.load('https://unpkg.com/three-globe/example/img/earth-water.png');

        const material = new THREE.MeshPhongMaterial({
            map: earthTexture,
            bumpMap: bumpMap,
            bumpScale: 0.05,
            specularMap: specularMap,
            specular: new THREE.Color('grey')
        });

        const earth = new THREE.Mesh(geometry, material);
        scene.add(earth);

        // Atmosphere Glow (custom shader simple version)
        const atmosphereGeometry = new THREE.SphereGeometry(5.1, 64, 64);
        const atmosphereMaterial = new THREE.MeshBasicMaterial({
            color: 0x00aaff,
            transparent: true,
            opacity: 0.1,
            side: THREE.BackSide,
            blending: THREE.AdditiveBlending
        });
        const atmosphere = new THREE.Mesh(atmosphereGeometry, atmosphereMaterial);
        scene.add(atmosphere);

        // Lighting
        const ambientLight = new THREE.AmbientLight(0x333333);
        scene.add(ambientLight);

        const directionalLight = new THREE.DirectionalLight(0xffffff, 1);
        directionalLight.position.set(5, 3, 5);
        scene.add(directionalLight);

        // Add a secondary blue light to simulate space
        const spaceLight = new THREE.DirectionalLight(0x0044ff, 0.3);
        spaceLight.position.set(-5, -3, -5);
        scene.add(spaceLight);

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- 2. SET UP MEDIAPIPE HAND TRACKING ---
        let handLandmarker = undefined;
        let runningMode = "VIDEO";
        const video = document.getElementById("webcam");
        const canvasElement = document.getElementById("output_canvas");
        const canvasCtx = canvasElement.getContext("2d");
        const enableWebcamButton = document.getElementById("enable-cam-btn");
        const statusText = document.getElementById("status");
        
        // Globe Control Variables
        let targetRotationX = 0;
        let targetRotationY = 0;
        let currentRotationX = 0;
        let currentRotationY = 0;
        let targetZoom = 15;
        let basePinchDistance = null;
        let isPinching = false;
        
        // Smoothing factors
        const rotationDamping = 0.05;
        const zoomDamping = 0.1;

        // Initialize MediaPipe
        async function createHandLandmarker() {
            const vision = await FilesetResolver.forVisionTasks(
                "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.0/wasm"
            );
            handLandmarker = await HandLandmarker.createFromOptions(vision, {
                baseOptions: {
                    modelAssetPath: `https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task`,
                    delegate: "GPU"
                },
                runningMode: runningMode,
                numHands: 1
            });
            statusText.innerText = "Ready!";
            statusText.style.color = "#00ff00";
            enableWebcamButton.style.display = "block";
        }
        createHandLandmarker();

        // Enable Webcam
        let webcamRunning = false;
        enableWebcamButton.addEventListener("click", () => {
            if (!handLandmarker) return;

            if (webcamRunning === true) {
                webcamRunning = false;
                enableWebcamButton.innerText = "Enable Camera";
            } else {
                webcamRunning = true;
                enableWebcamButton.style.display = "none";
                statusText.innerText = "Tracking Hands...";
                
                const constraints = { video: true };
                navigator.mediaDevices.getUserMedia(constraints).then((stream) => {
                    video.srcObject = stream;
                    video.addEventListener("loadeddata", predictWebcam);
                });
            }
        });

        let lastVideoTime = -1;
        let results = undefined;

        async function predictWebcam() {
            canvasElement.style.width = video.videoWidth;
            canvasElement.style.height = video.videoHeight;
            canvasElement.width = video.videoWidth;
            canvasElement.height = video.videoHeight;

            if (runningMode === "IMAGE") {
                runningMode = "VIDEO";
                await handLandmarker.setOptions({ runningMode: "VIDEO" });
            }

            let startTimeMs = performance.now();
            if (lastVideoTime !== video.currentTime) {
                lastVideoTime = video.currentTime;
                results = handLandmarker.detectForVideo(video, startTimeMs);
            }

            canvasCtx.save();
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
            
            // Render Hand UI & Logic
            if (results && results.landmarks) {
                if (results.landmarks.length > 0) {
                    const landmarks = results.landmarks[0]; // Take first hand
                    
                    // Palm center for rotation (landmark 9 is middle finger base)
                    const palmX = landmarks[9].x;
                    const palmY = landmarks[9].y;
                    
                    // Thumb and Index tip for Zoom
                    const thumb = landmarks[4];
                    const index = landmarks[8];
                    
                    // Calculate distance for pinch
                    const pinchDist = Math.sqrt(Math.pow(thumb.x - index.x, 2) + Math.pow(thumb.y - index.y, 2));
                    
                    // Draw custom high-tech UI on hand
                    canvasCtx.strokeStyle = "#00ffff";
                    canvasCtx.lineWidth = 2;
                    canvasCtx.fillStyle = "rgba(0, 255, 255, 0.2)";
                    
                    // Connecting lines
                    canvasCtx.beginPath();
                    canvasCtx.moveTo(thumb.x * canvasElement.width, thumb.y * canvasElement.height);
                    canvasCtx.lineTo(index.x * canvasElement.width, index.y * canvasElement.height);
                    canvasCtx.lineTo(palmX * canvasElement.width, palmY * canvasElement.height);
                    canvasCtx.closePath();
                    canvasCtx.stroke();
                    canvasCtx.fill();
                    
                    // Highlight tips
                    canvasCtx.beginPath();
                    canvasCtx.arc(index.x * canvasElement.width, index.y * canvasElement.height, 5, 0, 2 * Math.PI);
                    canvasCtx.fillStyle = "#fff";
                    canvasCtx.fill();

                    canvasCtx.beginPath();
                    canvasCtx.arc(thumb.x * canvasElement.width, thumb.y * canvasElement.height, 5, 0, 2 * Math.PI);
                    canvasCtx.fill();

                    // --- LOGIC MAP ---
                    
                    // ZOOM LOGIC
                    // Pinch threshold: if distance < 0.1, it's a pinch.
                    if (pinchDist < 0.1) {
                         // Pinched tightly, draw red to indicate zoom active
                         canvasCtx.strokeStyle = "#ff0000";
                         canvasCtx.beginPath();
                         canvasCtx.moveTo(thumb.x * canvasElement.width, thumb.y * canvasElement.height);
                         canvasCtx.lineTo(index.x * canvasElement.width, index.y * canvasElement.height);
                         canvasCtx.stroke();
                         
                         if (!isPinching) {
                             isPinching = true;
                             basePinchDistance = pinchDist;
                         }
                    } else {
                         isPinching = false;
                         // Map standard spread distance directly to camera Z
                         // Dist 0.1 (pinched) -> Z = 10 (close)
                         // Dist 0.4 (spread) -> Z = 25 (far)
                         let mappedZoom = 25 - ((pinchDist - 0.1) / 0.3) * 15;
                         // Clamp values
                         mappedZoom = Math.max(8, Math.min(25, mappedZoom));
                         targetZoom = mappedZoom;
                    }
                    
                    // ROTATION LOGIC
                    // Map palm position (0-1) to dramatic rotation values (-PI to PI)
                    // We invert X because the webcam is mirrored
                    targetRotationY = -(palmX - 0.5) * Math.PI * 2; 
                    targetRotationX = (palmY - 0.5) * Math.PI;

                }
            } else {
                // Return to idle slow spin when hand is gone
                targetRotationY += 0.005;
                isPinching = false;
            }
            canvasCtx.restore();

            if (webcamRunning === true) {
                window.requestAnimationFrame(predictWebcam);
            }
        }

        // --- 3. MAIN RENDER LOOP ---
        function animate() {
            requestAnimationFrame(animate);

            // Apply dampening to rotation for smooth movement
            currentRotationX += (targetRotationX - currentRotationX) * rotationDamping;
            currentRotationY += (targetRotationY - currentRotationY) * rotationDamping;
            
            earth.rotation.x = currentRotationX;
            earth.rotation.y = currentRotationY;
            atmosphere.rotation.x = currentRotationX;
            atmosphere.rotation.y = currentRotationY;

            // Apply dampening to zoom for smooth dolly
            camera.position.z += (targetZoom - camera.position.z) * zoomDamping;

            // Slow idle spin of stars
            stars.rotation.y += 0.0005;

            renderer.render(scene, camera);
        }
        
        // Start rendering immediately
        animate();
    </script>
</body>
</html>
